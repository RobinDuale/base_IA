# docker-image.yml -- Build et publication de l'image Docker de l'app dynamique
# Ne touche pas au pipeline GitHub Pages existant (deploy.yml) -- workflow séparé,
# le temps de la transition vers le serveur dynamique (VPS + Postgres).

name: Build et publication image Docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server.js"
      - "scripts/lib/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/docker-image.yml"

env:
  REGISTRY: ghcr.io
  # Doit être en minuscules (contrainte GHCR) -- le repo est RobinDuale/base_IA
  IMAGE_NAME: robinduale/base_ia

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Le projet "base-ia" est autonome (rattaché au réseau root_default en externe) --
      # ce déploiement ne touche jamais aux autres services partagés du VPS (n8n, CRM, Postgres, Traefik).
      - name: Redéployer le projet base-ia sur le VPS Hostinger
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          COMPOSE=$(cat <<'YAML'
          services:
            base-ia:
              image: ghcr.io/robinduale/base_ia:latest
              restart: always
              environment:
                - NOTION_API_KEY=${BASE_IA_NOTION_API_KEY}
                - INVALIDATE_TOKEN=${BASE_IA_INVALIDATE_TOKEN}
                - PORT=3000
              labels:
                - traefik.enable=true
                - traefik.http.routers.base-ia.rule=Host(`ia.duale.fr`)
                - traefik.http.routers.base-ia.tls=true
                - traefik.http.routers.base-ia.entrypoints=web,websecure
                - traefik.http.routers.base-ia.tls.certresolver=mytlschallenge
                - traefik.http.services.base-ia.loadbalancer.server.port=3000
              networks:
                default:
                  aliases:
                    - base-ia

          networks:
            default:
              name: root_default
              external: true
          YAML
          )

          ENVIRONMENT=$(cat <<VARS
          BASE_IA_NOTION_API_KEY=${{ secrets.BASE_IA_NOTION_API_KEY }}
          BASE_IA_INVALIDATE_TOKEN=${{ secrets.BASE_IA_INVALIDATE_TOKEN }}
          VARS
          )

          PAYLOAD=$(jq -n --arg name "base-ia" --arg content "$COMPOSE" --arg env "$ENVIRONMENT" \
            '{project_name: $name, content: $content, environment: $env}')

          curl -sS -f -X POST \
            -H "Authorization: Bearer $HOSTINGER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/1161197/docker" \
            -d "$PAYLOAD"
